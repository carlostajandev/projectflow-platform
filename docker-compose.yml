version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codemized_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codemized}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codemized_pass}
      POSTGRES_DB: ${POSTGRES_DB:-codemized_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-codemized}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemized_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemized_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-codemized}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-codemized_pass}
      DATABASE_NAME: ${POSTGRES_DB:-codemized_db}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - '3001:3001'
    networks:
      - codemized_network
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codemized_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'
    networks:
      - codemized_network

volumes:
  postgres_data:

networks:
  codemized_network:
    driver: bridge
